div class="panel" id="status-panel">
  <h2>Status</h2>
  <p id="status">IDLE</p>
</div>

<div class="panel" id="countdown-panel">
  <h2>Countdown</h2>
  <p id="countdown"></p>
</div>

<div class="panel" id="fuel-panel">
  <h2>Fuel</h2>
  <div id="fuel-container">
    <div id="fuel-bar"></div>
  </div>
</div>

<div class="panel" id="buttons-panel">
  <button onclick="prepare()">Prepare</button>
  <button onclick="launch()">Launch</button>
  <button onclick="triggerWarning()">Trigger Warning</button>
</div>

<div class="panel" id="warning-panel">
  <p id="warning">⚠️ WARNING: Engines Hot!</p>
</div>
